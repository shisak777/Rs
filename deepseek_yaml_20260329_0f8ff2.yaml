name: Bot Auto-Restart

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install
      run: pip install requests sseclient-py speedtest-cli
    
    - name: Run
      run: python3 rex.py
      timeout-minutes: 280
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}